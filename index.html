<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style type="text/tailwindcss">
      @theme {
        --color-primary: #7fc0fa;
        --color-secondary: #020202;
        --color-secondary-mute: #607080;
        --color-card: #f0fa73;
        --color-tcard: #a8120b;
      }

      body {
        font-family: "Poppins", sans-serif;
      }
    </style>

    <title>Sunu Idée</title>
  </head>

  <body class="flex justify-center">
    <div class="w-full max-w-6xl flex flex-col justify-center p-8">
      <div class="flex flex-col mb-8">
        <h1 class="text-4xl font-bold text-secondary">SUNU IDÉE</h1>

        <p class="text-secondary-mute mt-2">
          Partagez vos idées pour améliorer le campus
        </p>
      </div>

      <div class="liste-idees mb-8">
        <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-4">

  <h4 class="text-secondary font-medium text-xl md:text-2xl">
    Liste des idées proposées
  </h4>

  <div class="ajout-idee flex flex-col sm:flex-row items-stretch sm:items-center gap-2">

    <button
      class="px-4 py-2 rounded-xl bg-primary/80 text-black hover:bg-primary transition font-medium cursor-pointer"
      id="ajouter-idee-btn"
    >
      + Ajouter une idée
    </button>

    <button
      id="all_delete"
      class="px-5 py-2 rounded-xl bg-red-100 text-red-600 hover:bg-red-600 hover:text-white transition font-medium cursor-pointer flex items-center justify-center gap-2"
    >
       <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="size-6"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"
                />
              </svg>

      
    </button>

  </div>

  <div
    id="toast"
    class="hidden fixed top-5 right-5 px-6 py-3 rounded-xl shadow-lg text-white z-50"
  ></div>

</div>
        <div class="filtre mb-8">
          <h4 class="text-secondary font-medium mb-2">Filtrer par catégorie</h4>
          <div class="flex flex-wrap items-center justify-between gap-4 mb-8">
            
            <div class="flex flex-wrap gap-3">
              <button
             
                data-filter="all"
                class="filter-btn active px-5 py-2 rounded-full bg-primary text-black font-medium cursor-pointer"
              >
                Toutes
              </button>

              <button
                data-filter="pedagogie"
                class="filter-btn px-5 py-2 rounded-full bg-gray-100 hover:bg-gray-200 transition cursor-pointer"
              >
                Pédagogie
              </button>

              <button
                data-filter="evenement"
                class="filter-btn px-5 py-2 rounded-full bg-gray-100 hover:bg-gray-200 transition cursor-pointer"
              >
                Événement
              </button>

              <button
                data-filter="campus"
                class="filter-btn px-5 py-2 rounded-full bg-gray-100 hover:bg-gray-200 cursor-pointer transition"
              >
                Campus
              </button>

              <button
                data-filter="tech"
                class="filter-btn px-5 py-2 rounded-full bg-gray-100 hover:bg-gray-200 transition cursor-pointer"
              >
                Tech
              </button>
            </div>
          </div>
          
        </div>

        <div
          id="liste-idees"
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
        ></div>
      </div>

      <div
        id="modal"
        class="modal hidden fixed inset-0 bg-black/55 flex items-center justify-center"
      >
        <div class="modal-content bg-white p-6 rounded-xl w-full max-w-md">
          <div class="flex justify-end">
            <button
              id="fermer-modal"
              class="text-secondary-mute cursor-pointer text-xl font-bold"
            >
              X
            </button>
          </div>
          <h2 class="text-2xl font-bold text-secondary mb-4">
            Ajouter une idée
          </h2>

          <form id="idee-form" class="flex flex-col">
            <input
              type="text"
              id="idee-titre"
              placeholder="Titre de l'idée"
              class="mb-4 p-2 border border-gray-300 rounded"
              required
            />
            <p id="titre-error" class="text-red-500 text-sm hidden"></p>
            <textarea
              id="idee-description"
              placeholder="Description de l'idée"
              class="mb-4 p-2 border border-gray-300 rounded"
              required
            ></textarea>
            <p id="description-error" class="text-red-500 text-sm hidden"></p>
            
            <button
              type="submit"
              id="submit-btn"
              class="px-4 py-2 bg-primary text-white rounded-xl"
            >
              Soumettre l'idée
            </button>
          </form>
          <div id="form-loader" class="hidden flex items-center gap-2 text-sm text-gray-500 mt-3">
  <div class="w-4 h-4 border-2 border-gray-400 border-t-transparent rounded-full animate-spin"></div>
  <span>Traitement en cours...</span>
</div>
        </div>
      </div>
    </div>
    <script type="module"  src="src/main.js"></script>



  </body>
</html>
